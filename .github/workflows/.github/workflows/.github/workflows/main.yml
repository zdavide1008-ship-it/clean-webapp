name: Build APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x ./CleanWebApp_oneclick/gradlew || true

      - name: Build APK
        working-directory: CleanWebApp_oneclick
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug
          else
            echo "No gradlew found, using system gradle"
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: CleanWebApp_oneclick/app/build/outputs/apk/debug/app-debug.apk
