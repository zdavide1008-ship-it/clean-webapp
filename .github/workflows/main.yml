name: Build APK Release

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ 自动安装 Gradle（不用 gradlew）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 🔥 自动找到真正的 Android 项目目录
      - name: Detect project folder
        run: |
          echo "Current dir:"
          pwd
          echo "List files:"
          ls -la
          echo "Searching gradle project:"
          find . -name "build.gradle" -o -name "settings.gradle"

      # ✅ 进入真正 Android 项目目录（关键修复点）
      - name: Build APK
        run: |
          cd CleanWebApp_oneclick
          gradle assembleDebug

      # 🔍 找 APK（不管输出在哪都能找到）
      - name: Find APK
        run: |
          find . -type f -name "*.apk"

      # 📦 上传 artifact（GitHub 页面可下载）
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: CleanWebApp_oneclick/**/build/outputs/apk/**/*.apk

      # 🚀 自动生成 Release（真正“一键下载”）
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: CleanWebApp_oneclick/**/build/outputs/apk/**/*.apk
