name: Build APK Release

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ 关键：自动安装 Gradle（因为你项目没有 gradlew）
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      # 🔥 编译 APK（按你项目结构）
      - name: Build APK
        run: gradle assembleDebug
        working-directory: CleanWebApp_oneclick

      # 🔍 找 APK
      - name: Locate APK
        run: find . -name "*.apk"

      # 📦 上传构建产物（Artifacts）
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: CleanWebApp_oneclick/**/build/outputs/apk/**/*.apk

      # 🚀 生成 Release（重点：一键下载）
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: CleanWebApp_oneclick/**/build/outputs/apk/**/*.apk
