name: Build APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant permission
        run: chmod +x CleanWebApp_oneclick/build.sh

      - name: Build APK
        working-directory: CleanWebApp_oneclick
        run: |
          ./build.sh

      - name: Find APK
        run: |
          find . -name "*.apk" > apk.txt
          cat apk.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            **/*.apk
